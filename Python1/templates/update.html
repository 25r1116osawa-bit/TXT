{% extends "base.html" %}

{% block content %}

<form method="POST">

<label for="departmentid">部門ID</label> 
<input type="number" value="{{dpt.id}}" ><br>

<br>

    <option value="True">削除</option>
</select>
<input type="submit" value="更新">

</form>

{% endblock %}
